spring.application.name=notifyme

# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Clerk Authentication
clerk.secret-key=${CLERK_SECRET_KEY}

# AWS S3 (app icons). Leave blank locally — icon upload will no-op when not configured.
aws.s3.bucket=${AWS_S3_BUCKET:}
aws.s3.region=${AWS_S3_REGION:}
aws.s3.access-key-id=${AWS_ACCESS_KEY_ID:}
aws.s3.secret-access-key=${AWS_SECRET_ACCESS_KEY:}
aws.s3.public-url-base=${AWS_S3_PUBLIC_URL_BASE:}
