services:
  - type: web
    name: notify-me-backend
    runtime: java
    region: oregon
    rootDir: backend
    buildCommand: ./gradlew build -x test
    startCommand: java -jar build/libs/*.jar
    healthCheckPath: /actuator/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: notify-me-db
          property: connectionString
      - key: JAVA_VERSION
        value: "17"

databases:
  - name: notify-me-db
    region: oregon
    plan: free
